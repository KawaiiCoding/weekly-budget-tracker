<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Budget Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Budget Tracker</h1>
            <div class="sync-panel mantine-card">
                <div class="status-indicator">
                    <span id="sync-status-dot" class="dot disconnected"></span>
                    <span id="sync-status-text">Disconnected</span>
                </div>
                <div class="sync-controls">
                    <button class="btn btn-outline" onclick="generateSyncCode()">Generate Code</button>
                    <input type="text" id="sync-code-input" placeholder="Enter code..." maxlength="6">
                    <button class="btn btn-primary" onclick="joinSync()">Join</button>
                    <div id="active-code-display"></div>
                </div>
            </div>
        </header>

        <section class="setup-panel mantine-card">
            <h2>Configuration</h2>
            <div class="grid-2">
                <div class="input-group">
                    <label>Start Date</label>
                    <input type="date" id="start-date" value="2026-05-23" onchange="updateSettings()">
                </div>
                <div class="input-group">
                    <label>Total Budget (€)</label>
                    <input type="number" id="total-budget" value="1000" onchange="updateSettings()">
                </div>
            </div>
            <div class="control-buttons mt-1">
                <button class="btn btn-outline" onclick="exportData()">Export JSON</button>
                <button class="btn btn-outline" onclick="openImport()">Import JSON</button>
            </div>
        </section>

        <section class="dashboard mantine-card">
            <div class="stat-box">
                <h3>Total Budget</h3>
                <p id="dash-total">€1000.00</p>
            </div>
            <div class="stat-box">
                <h3>Total Spent</h3>
                <p id="dash-spent">€0.00</p>
            </div>
            <div class="stat-box">
                <h3>Remaining</h3>
                <p id="dash-remaining">€1000.00</p>
            </div>
        </section>

        <section id="weeks-container" class="weeks-grid"></section>

    </div>

    <div id="import-modal" class="modal hidden">
        <div class="modal-content mantine-card">
            <h3>Import JSON Data</h3>
            <textarea id="import-json" rows="6" placeholder="Paste JSON here..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeImport()">Cancel</button>
                <button class="btn btn-primary" onclick="importData()">Import</button>
            </div>
        </div>
    </div>

    <script src="js/sync.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
