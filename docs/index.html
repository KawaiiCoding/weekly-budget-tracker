<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weekly Budget Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Budget Tracker</h1>
            <button id="theme-toggle" class="btn btn-outline" onclick="toggleTheme()">🌙</button>
        </header>
                <div class="sync-panel mantine-card" id="card-sync">
            <div class="card-header" onclick="toggleCollapse('card-sync')">
                <div class="status-indicator" style="display: flex; align-items: center;">
                    <span id="sync-status-dot" class="dot disconnected"></span>
                    <span id="sync-status-text">Disconnected</span>
                    
                    <span id="header-code-display" class="hidden" style="margin-left: 10px; background: var(--bg-color); padding: 2px 8px; border-radius: 4px; font-weight: bold; font-family: monospace;">
                        <span id="header-code-text"></span>
                        <span style="cursor: pointer; margin-left: 5px; font-size: 16px;" onclick="copySyncCode(event)" title="Copy Code">📋</span>
                    </span>
                </div>
                <span class="collapse-icon">▼</span>
            </div>
            <div class="collapsible-content">
                <div class="sync-controls" id="sync-controls-disconnected">
                    <button class="btn btn-outline" onclick="generateSyncCode()">Generate Code</button>
                    <input type="text" id="sync-code-input" placeholder="Code..." maxlength="6">
                    <button class="btn btn-primary" onclick="joinSync()">Join</button>
                </div>
                <div class="sync-controls hidden" id="sync-controls-connected">
                    <button class="btn btn-danger" onclick="disconnectSync()">Disconnect</button>
                </div>
            </div>
            </div>

        <section class="setup-panel mantine-card" id="card-setup">
            <div class="card-header" onclick="toggleCollapse('card-setup')">
                <h2>Configuration</h2>
                <span class="collapse-icon">▼</span>
            </div>
            <div class="collapsible-content mt-1">
                <div class="grid-2">
                    <div class="input-group">
                        <label>Start Date</label>
                        <input type="date" id="start-date" value="2026-05-23" onchange="updateSettings()">
                    </div>
                    <div class="input-group">
                        <label>Total Budget (€)</label>
                        <input type="number" id="total-budget" value="1000" onchange="updateSettings()">
                    </div>
                </div>
                <div class="control-buttons mt-1">
                    <button class="btn btn-outline" onclick="exportData()">Export JSON</button>
                    <button class="btn btn-outline" onclick="openImport()">Import JSON</button>
                </div>
            </div>
        </section>

        <section class="dashboard mantine-card" id="card-dash">
            <div class="card-header" onclick="toggleCollapse('card-dash')">
                <h2>Dashboard</h2>
                <span class="collapse-icon">▼</span>
            </div>
            <div class="collapsible-content mt-1">
                <div class="dashboard-grid">
                    <div class="stat-box">
                        <h3>Total Budget</h3>
                        <p id="dash-total">€1000.00</p>
                    </div>
                    <div class="stat-box">
                        <h3>Total Spent</h3>
                        <p id="dash-spent">€0.00</p>
                    </div>
                    <div class="stat-box">
                        <h3>Remaining</h3>
                        <p id="dash-remaining">€1000.00</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="weeks-container" class="weeks-grid"></section>
    </div>

    <div id="import-modal" class="modal hidden">
        <div class="modal-content mantine-card">
            <h3>Import JSON Data</h3>
            <textarea id="import-json" rows="6" placeholder="Paste JSON here..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeImport()">Cancel</button>
                <button class="btn btn-primary" onclick="importData()">Import</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal hidden">
        <div class="modal-content mantine-card">
            <h3>Delete Spending?</h3>
            <p>Are you sure you want to delete this entry? This action cannot be undone.</p>
            <div class="modal-actions mt-1">
                <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn btn-danger" id="confirm-delete-btn">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/sync.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
