<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Wallet</title>
    <meta name="apple-mobile-web-app-title" content="Wallet">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#228be6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Budget Tracker</h1>
            <button id="theme-toggle" class="btn btn-outline icon-btn" onclick="toggleTheme()" style="height: 38px; width: 38px;">
                <i data-lucide="moon" id="theme-icon" class="lucide-sm"></i>
            </button>
        </header>

        <div class="sync-panel mantine-card" id="card-sync">
            <div class="card-header" onclick="toggleCollapse('card-sync')">
                <div class="status-indicator">
                    <span id="sync-status-dot" class="dot disconnected"></span>
                    <span id="sync-status-text">OFFLINE</span>
                    <span id="header-code-display" class="hidden">
                        <span id="header-code-text"></span>
                        <span class="copy-btn" onclick="copySyncCode(event)">
                            <i data-lucide="copy" class="lucide-sm"></i>
                        </span>
                    </span>
                </div>
                <i data-lucide="chevron-down" class="collapse-icon"></i>
            </div>
            <div class="collapsible-content" style="margin-top: 15px;">
                <div class="sync-controls" id="sync-controls-disconnected">
                    <button class="btn btn-outline" style="width:100%" onclick="generateSyncCode()">Create Wallet</button>
                    <div class="config-grid" style="grid-template-columns: 1fr 80px;">
                        <input type="text" id="sync-code-input" placeholder="Code..." maxlength="6">
                        <button class="btn btn-primary" onclick="joinSync()">Join</button>
                    </div>
                </div>
                <div class="sync-controls hidden" id="sync-controls-connected">
                    <button class="btn btn-danger" style="width:100%" onclick="disconnectSync()">Disconnect Wallet</button>
                </div>
            </div>
        </div>

        <section class="setup-panel mantine-card" id="card-setup">
            <div class="card-header" onclick="toggleCollapse('card-setup')">
                <h2>Configuration</h2>
                <i data-lucide="chevron-down" class="collapse-icon"></i>
            </div>
            <div class="collapsible-content">
                <div class="config-grid">
                    <div class="input-group">
                        <label>Budget (€)</label>
                        <input type="text" id="total-budget" placeholder="1000.00" onchange="updateSettings()">
                    </div>
                    <div class="input-group">
                        <label>Start Date</label>
                        <input type="date" id="start-date" onchange="updateSettings()">
                    </div>
                </div>
            </div>
        </section>

        <section class="dashboard mantine-card" id="card-dash">
            <div class="card-header" onclick="toggleCollapse('card-dash')">
                <h2>Dashboard</h2>
                <i data-lucide="chevron-down" class="collapse-icon"></i>
            </div>
            <div class="collapsible-content">
                <div class="dashboard-grid">
                    <div class="stat-box"><h3>Budget</h3><p id="dash-total">€0</p></div>
                    <div class="stat-box"><h3>Spent</h3><p id="dash-spent">€0</p></div>
                    <div class="stat-box"><h3>Left</h3><p id="dash-remaining">€0</p></div>
                </div>
            </div>
        </section>

        <section id="weeks-container"></section>
    </div>

    <div id="delete-modal" class="modal hidden">
        <div class="modal-content mantine-card" style="width: 90%; max-width: 300px;">
            <h3>Delete Entry?</h3>
            <p style="font-size: 14px; opacity: 0.8;">This cannot be undone.</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-outline" style="flex:1" onclick="closeDeleteModal()">No</button>
                <button class="btn btn-danger" style="flex:1" id="confirm-delete-btn">Yes</button>
            </div>
        </div>
    </div>

    <div id="new-month-modal" class="modal hidden">
        <div class="modal-content mantine-card" style="width: 90%; max-width: 350px; text-align: center;">
            <div style="font-size: 40px; margin-bottom: 10px;">🗓️</div>
            <h3>Start New Month?</h3>
            <p style="font-size: 14px; opacity: 0.7; margin-bottom: 20px;">Current spendings will be archived and the start date will move forward 4 weeks.</p>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-outline" style="flex:1" onclick="closeModal('new-month-modal')">Cancel</button>
                <button class="btn btn-primary" style="flex:1" onclick="confirmNewMonth()">Start Fresh</button>
            </div>
        </div>
    </div>

    <div id="history-modal" class="modal hidden">
        <div class="modal-content mantine-card" style="width: 95%; max-width: 450px; max-height: 85vh; overflow-y: auto;">
            <div class="card-header" style="padding-bottom: 15px; border-bottom: 1px solid var(--border);">
                <h2>History & Archive</h2>
                <button class="btn btn-outline icon-btn" onclick="closeModal('history-modal')">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="history-list" style="margin-top: 15px;">
                </div>
        </div>
    </div>

    <script src="js/sync.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
