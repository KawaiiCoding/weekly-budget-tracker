<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Budget Tracker</h1>
            <button id="theme-toggle" class="btn btn-outline icon-btn" onclick="toggleTheme()">
                <i data-lucide="moon" id="theme-icon"></i>
            </button>
        </header>

        <div class="sync-panel mantine-card" id="card-sync">
            <div class="card-header" onclick="toggleCollapse('card-sync')">
                <div class="status-indicator">
                    <span id="sync-status-dot" class="dot disconnected"></span>
                    <span id="sync-status-text">Disconnected</span>
                    <span id="header-code-display" class="hidden">
                        <span id="header-code-text"></span>
                        <span class="copy-btn" onclick="copySyncCode(event)">
                            <i data-lucide="copy" class="lucide-sm"></i>
                        </span>
                    </span>
                </div>
                <i data-lucide="chevron-down" class="collapse-icon"></i>
            </div>
            <div class="collapsible-content">
                <div class="sync-controls" id="sync-controls-disconnected">
                    <button class="btn btn-outline" onclick="generateSyncCode()">Generate Code</button>
                    <input type="text" id="sync-code-input" placeholder="Code..." maxlength="6">
                    <button class="btn btn-primary" onclick="joinSync()">Join</button>
                </div>
                <div class="sync-controls hidden" id="sync-controls-connected">
                    <button class="btn btn-danger" onclick="disconnectSync()">Disconnect Room</button>
                </div>
            </div>
        </div>

        <section class="setup-panel mantine-card" id="card-setup">
            <div class="card-header" onclick="toggleCollapse('card-setup')">
                <h2>Configuration</h2>
                <i data-lucide="chevron-down" class="collapse-icon"></i>
            </div>
            <div class="collapsible-content">
                <div class="config-grid">
                    <div class="input-group">
                        <label>Start Date</label>
                        <input type="date" id="start-date" onchange="updateSettings()">
                    </div>
                    <div class="input-group">
                        <label>Budget (€)</label>
                        <input type="text" id="total-budget" placeholder="1000.00" onchange="updateSettings()">
                    </div>
                </div>
            </div>
        </section>

        <section class="dashboard mantine-card" id="card-dash">
            <div class="card-header" onclick="toggleCollapse('card-dash')">
                <h2>Dashboard</h2>
                <i data-lucide="chevron-down" class="collapse-icon"></i>
            </div>
            <div class="collapsible-content">
                <div class="dashboard-grid">
                    <div class="stat-box"><h3>Budget</h3><p id="dash-total">€0</p></div>
                    <div class="stat-box"><h3>Spent</h3><p id="dash-spent">€0</p></div>
                    <div class="stat-box"><h3>Left</h3><p id="dash-remaining">€0</p></div>
                </div>
            </div>
        </section>

        <section id="weeks-container" class="weeks-grid"></section>
    </div>

    <div id="delete-modal" class="modal hidden">
        <div class="modal-content mantine-card">
            <h3>Delete Entry?</h3>
            <p>This will remove the spending forever.</p>
            <div class="modal-actions mt-1">
                <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn btn-danger" id="confirm-delete-btn">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/sync.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
