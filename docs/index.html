<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Wallet</title>
    <meta name="apple-mobile-web-app-title" content="Wallet">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#228be6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center;">
                <img id="pompom-icon" src="https://w7.pngwing.com/pngs/596/579/png-transparent-pompompurin-cute.png" alt="cute">
                <h1>Budget Tracker</h1>
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="persona-toggle" class="btn btn-outline icon-btn" onclick="togglePersona()">
                    <i data-lucide="user" id="persona-icon" class="lucide-sm"></i>
                </button>
                <button id="theme-toggle" class="btn btn-outline icon-btn" onclick="toggleTheme()">
                    <i data-lucide="moon" id="theme-icon" class="lucide-sm"></i>
                </button>
            </div>
        </header>

        <div class="sync-panel mantine-card" id="card-sync">
    <div class="card-header" onclick="toggleCollapse('card-sync')">
                <div class="status-indicator">
                    <div class="live-tag">
                        <span id="sync-status-dot" class="dot disconnected"></span>
                        <span id="sync-status-text">OFFLINE</span>
                    </div>
                    <div id="header-code-display" class="code-group hidden">
                        <span id="header-code-text"></span>
                        <span class="copy-btn" onclick="copySyncCode(event)">
                            <i data-lucide="copy" class="lucide-sm"></i>
                        </span>
                    </div>
                </div>
                <i data-lucide="chevron-down" class="collapse-icon"></i>
            </div>
            <div class="collapsible-content" style="margin-top: 15px;">
                <div class="sync-controls" id="sync-controls-disconnected">
                    <button class="btn btn-outline" style="width:100%" onclick="generateSyncCode()">Create Wallet</button>
                    <div class="config-grid" style="grid-template-columns: 1fr 80px;">
                        <input type="text" id="sync-code-input" placeholder="Code..." maxlength="6">
                        <button class="btn btn-primary" onclick="joinSync()">Join</button>
                    </div>
                </div>
                <div class="sync-controls hidden" id="sync-controls-connected">
                    <button class="btn btn-danger" style="width:100%; justify-content: center; background: #fff5f5; color: var(--warning);" onclick="disconnectSync()">
                        Disconnect Wallet
                    </button>
                </div>
            </div>
        </div>

        <section class="setup-panel mantine-card" id="card-setup">
            <div class="card-header" onclick="toggleCollapse('card-setup')">
                <h2>Configuration</h2>
                <i data-lucide="chevron-down" class="collapse-icon"></i>
            </div>
            <div class="collapsible-content">
                <div class="config-grid">
                    <div class="input-group">
                        <label>Budget (€)</label>
                        <input type="text" id="total-budget" placeholder="1000.00" onchange="updateSettings()">
                    </div>
                    <div class="input-group">
                        <label>Start Date</label>
                        <input type="date" id="start-date" onchange="updateSettings()">
                    </div>
                </div>
            </div>
        </section>

        <section class="dashboard mantine-card" id="card-dash">
            <div class="card-header" onclick="toggleCollapse('card-dash')">
                <h2>Dashboard</h2>
                <i data-lucide="chevron-down" class="collapse-icon"></i>
            </div>
            <div class="collapsible-content">
                <div class="dashboard-grid">
                    <div class="stat-box"><h3>Budget</h3><p id="dash-total">€0</p></div>
                    <div class="stat-box"><h3>Spent</h3><p id="dash-spent">€0</p></div>
                    <div class="stat-box"><h3>Left</h3><p id="dash-remaining">€0</p></div>
                </div>
            </div>
        </section>

        <section id="weeks-container"></section>
    </div>

    <div id="delete-modal" class="modal hidden">
        <div class="mantine-card modal-content" style="max-width: 300px; text-align: center;">
            <h3 style="margin-top: 0;">Delete Entry?</h3>
            <p style="font-size: 14px; opacity: 0.8; margin: 15px 0; line-height: 1.5;"></p>
            <div style="display: flex; gap: 10px;">
             <button class="btn btn-outline" style="flex: 1;" onclick="closeModal('delete-modal')">Cancel</button>
            <button id="confirm-delete-btn" class="btn btn-danger" style="flex: 1; background: var(--warning); color: white; border: none;">Delete</button>
            </div>
        </div>
    </div>

    <div id="error-modal" class="modal hidden">
        <div class="mantine-card modal-content" style="max-width: 320px; text-align: center; border-top: 4px solid var(--warning);">
            <div style="color: var(--warning); margin-bottom: 12px;">
                <i data-lucide="alert-circle" style="width: 40px; height: 40px;"></i>
            </div>
            <h3 style="margin-top: 0;">Oops!</h3>
            <p id="error-message" style="font-size: 14px; opacity: 0.8; margin: 10px 0 20px 0; line-height: 1.5;"></p>
            <button class="btn btn-primary" style="width: 100%;" onclick="closeModal('error-modal')">Got it</button>
        </div>
    </div>

    <div id="new-month-modal" class="modal hidden">
        <div class="modal-content mantine-card" style="width: 90%; max-width: 350px; text-align: center;">
            <div style="font-size: 40px; margin-bottom: 10px;">🗓️</div>
            <h3>Start New Month?</h3>
            <p style="font-size: 14px; opacity: 0.7; margin-bottom: 20px;">Archives current data and rolls the date forward.</p>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-outline" style="flex:1" onclick="closeModal('new-month-modal')">Cancel</button>
                <button class="btn btn-primary" style="flex:1" onclick="confirmNewMonth()">Start Fresh</button>
            </div>
        </div>
    </div>

    <div id="history-modal" class="modal hidden">
        <div class="modal-content mantine-card" style="width: 95%; max-width: 450px; max-height: 85vh; overflow-y: auto;">
            <div class="card-header" style="padding-bottom: 15px; border-bottom: 1px solid var(--border);">
                <h2>History & Archive</h2>
                <button class="btn btn-outline icon-btn" onclick="closeModal('history-modal')">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="history-list" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script src="js/sync.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
